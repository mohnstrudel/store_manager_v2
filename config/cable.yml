development:
  adapter: async

test:
  adapter: test

redis_defaults: &redis_defaults
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  ssl_params:
    verify_mode: <%= OpenSSL::SSL::VERIFY_NONE %>

staging:
  <<: *redis_defaults
  channel_prefix: store_manager_v2_staging

production:
  <<: *redis_defaults
  channel_prefix: store_manager_v2_production
